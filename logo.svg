<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle background -->
  <circle cx="250" cy="250" r="240" fill="#f5f5f5" stroke="#ddd" stroke-width="2"/>
  
  <!-- Center image circle -->
  <circle cx="250" cy="250" r="140" fill="#87ceeb" stroke="#fff" stroke-width="8"/>
  <circle cx="250" cy="250" r="135" fill="#e8f4f8"/>
  
  <!-- Industrial cooling towers representation -->
  <g id="towers">
    <!-- Left tower -->
    <path d="M 200 280 L 190 200 L 210 200 L 220 280 Z" fill="#8b7d6b" stroke="#555" stroke-width="1.5"/>
    <ellipse cx="205" cy="280" rx="10" ry="8" fill="#6b5d4f"/>
    
    <!-- Center left tower -->
    <path d="M 230 290 L 215 160 L 240 160 L 255 290 Z" fill="#a0988f" stroke="#555" stroke-width="1.5"/>
    <ellipse cx="237" cy="290" rx="12" ry="10" fill="#7a726a"/>
    
    <!-- Center right tower (largest) -->
    <path d="M 260 295 L 240 130 L 280 130 L 300 295 Z" fill="#8b7d6b" stroke="#555" stroke-width="1.5"/>
    <ellipse cx="270" cy="295" rx="14" ry="12" fill="#6b5d4f"/>
    
    <!-- Right tower -->
    <path d="M 310 285 L 300 180 L 325 180 L 335 285 Z" fill="#a0988f" stroke="#555" stroke-width="1.5"/>
    <ellipse cx="317.5" cy="285" rx="11" ry="9" fill="#7a726a"/>
    
    <!-- Smoke stacks -->
    <rect x="237" y="140" width="6" height="25" fill="#666"/>
    <rect x="264" y="145" width="6" height="20" fill="#666"/>
    <rect x="290" y="150" width="6" height="15" fill="#666"/>
    
    <!-- Sky element -->
    <circle cx="280" cy="170" r="8" fill="#fff" opacity="0.6"/>
    <circle cx="260" cy="175" r="6" fill="#fff" opacity="0.5"/>
  </g>
  
  <!-- Green arrow (Industrial Implementation) -->
  <g id="green-arrow">
    <path d="M 80 150 Q 100 80, 150 70 L 160 85 Q 115 95, 100 155 Z" fill="#1b7c2c" stroke="#0d4620" stroke-width="2"/>
    <text x="85" y="120" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">INDUSTRIAL</text>
    <text x="85" y="145" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">INSTRUMENTATION</text>
  </g>
  
  <!-- Navy arrow (PLQ) -->
  <g id="navy-arrow">
    <path d="M 420 150 Q 400 80, 350 70 L 340 85 Q 385 95, 400 155 Z" fill="#001a4d" stroke="#000033" stroke-width="2"/>
    <text x="380" y="100" font-size="32" font-weight="bold" fill="#ffc107" text-anchor="middle" letter-spacing="2">PLQ</text>
  </g>
  
  <!-- Orange arrow (SCADA) -->
  <g id="orange-arrow">
    <path d="M 420 350 Q 400 420, 350 430 L 340 415 Q 385 405, 400 345 Z" fill="#ff9500" stroke="#cc7700" stroke-width="2"/>
    <text x="380" y="410" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="1">SCADA</text>
  </g>
  
  <!-- Red arrow (CIN) -->
  <g id="red-arrow">
    <path d="M 80 350 Q 100 420, 150 430 L 160 415 Q 115 405, 100 345 Z" fill="#8b0000" stroke="#550000" stroke-width="2"/>
    <text x="85" y="410" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="1">CIN</text>
  </g>
  
  <!-- Center text -->
  <text x="250" y="420" font-size="26" font-weight="bold" fill="#001a4d" text-anchor="middle" letter-spacing="2">HITECH AUTOMATION</text>
</svg>